name: Deploy konspekt to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Права, которые нужны официальному деплою Pages через Actions.
permissions:
  contents: read
  pages: write
  id-token: write

# Одновременно — только один деплой; новый пуш отменяет предыдущий незавершённый.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      # Публикуем ровно папку docs/ (konspekt как статический сайт).
      - name: Upload docs artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
