# Политика разрешений (тема 15).
#
# ГЛАВНОЕ: политика живёт ЗДЕСЬ, в конфиге, а не в коде. Поменять то, что
# требует подтверждения, — это правка ЭТОГО файла, а не правка agent.py.
# Код (permissions.py) — лишь неизменный шлюз: он читает эти правила и
# применяет их ПЕРЕД каждым вызовом инструмента.
#
# Три списка проверяются ПО ПОРЯДКУ, первое совпадение выигрывает:
#   always_deny  -> блок без исключений (проверяется первым)
#   always_allow -> тихий пропуск, без уведомления
#   ask_user     -> пауза и запрос подтверждения [y/N]
# Ни одно не совпало -> по умолчанию разрешить.
#
# Шаблоны — регулярки (re.search, IGNORECASE) по строке вида
# "<имя_инструмента> <аргументы>"; для bash — по самой команде.

always_deny:
  - pattern: "rm -rf /"
    reason: "Безусловное рекурсивное удаление от корня"
  - pattern: "\\bsudo\\b"
    reason: "Повышение привилегий запрещено"
  - pattern: "curl.*\\| *sh|wget.*\\| *sh"
    reason: "Скачивание с прямым пайпом в shell заблокировано"

always_allow:
  - pattern: "^(read_file|list_dir|glob|grep|list_tasks|team_status) "
    reason: "Чтение/поиск — всегда безопасно"
  - pattern: "^bash (ls|cat|pwd)( |$|-)"
    reason: "Просмотр файлов всегда безопасен"
  - pattern: "^bash git (status|log|diff|show)"
    reason: "Read-only git-команды всегда безопасны"
  - pattern: "--version"
    reason: "Проверка версии всегда безопасна"

ask_user:
  - pattern: "^bash rm "
    reason: "Удаление файла требует подтверждения"
  - pattern: "^bash git (commit|push|merge|rebase)"
    reason: "Пишущие git-операции требуют подтверждения"
  - pattern: "^bash (pip install|npm install)"
    reason: "Установка пакетов требует подтверждения"
  - pattern: "\\.env"
    reason: "Доступ к .env-файлам требует подтверждения"
